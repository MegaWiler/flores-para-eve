<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Eve ❤️</title>
    <style>
        /* ESTILOS DE LA PORTADA */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #fdf2f5;
            font-family: 'Arial Black', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center;
        }

        #contenedor-portada {
            z-index: 500; transition: opacity 1.5s ease;
            width: 100%; max-width: 600px; padding: 20px;
        }

        h1 { color: #ff4081; font-size: 3rem; margin-bottom: 25px; font-weight: 900; }

        .photo-frame {
            background-color: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: inline-block; margin: 10px; border: 5px solid white;
            overflow: hidden;
        }

        .main-photo { width: 220px; height: 220px; }
        .small-photos-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .small-photo { width: 110px; height: 110px; }
        img { width: 100%; height: 100%; object-fit: cover; }

        .description-highlight {
            color: #ff4081; font-size: 1.3rem; font-weight: 900;
            text-transform: uppercase; margin-bottom: 35px;
        }

        .btn-primary {
            display: inline-block; padding: 18px 45px;
            background-color: #ffc107; color: #000;
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            cursor: pointer; border: none; box-shadow: 0 6px 20px rgba(255, 193, 7, 0.5);
        }

        /* ESTILOS DE LA CANCIÓN - KARAOKE INTENSO */
        #video-fondo { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; display: none; 
        }

        #lyrics-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95%; text-align: center; z-index: 100; display: none;
        }

        .lyrics-line { 
            font-size: 3.2rem; 
            font-weight: 900; 
            text-transform: uppercase;
            line-height: 1.1;
            display: inline-block;
            color: rgba(255, 255, 255, 0.15); /* Color base apagado */
            background-image: linear-gradient(to bottom, #ffffff, #bd00ff, #00d4ff);
            background-repeat: no-repeat;
            background-size: 0% 100%; /* Inicia vacío para el efecto karaoke */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Resplandor Neón constante */
            filter: drop-shadow(0 0 12px rgba(189, 0, 255, 0.9));
            animation: fill-animation linear forwards;
        }

        @keyframes fill-animation {
            to { background-size: 100% 100%; }
        }

        .petal { position: absolute; top: -50px; background-color: #ffeb3b; width: 15px; height: 15px; border-radius: 150% 0 150% 0; z-index: 50; opacity: 0.9; animation: caida linear forwards; }
        @keyframes caida { to { transform: translateY(110vh) rotate(360deg); } }

        #mensaje-despedida { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; opacity: 0; transition: opacity 3s; z-index: 200; display: none; font-weight: 900; }
        
        @media (max-width: 600px) {
            .lyrics-line { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="contenedor-portada">
        <h1>Hola!</h1>
        <div class="photo-frame main-photo"><img src="mapache flor.jpg"></div>
        <div class="small-photos-container">
            <div class="photo-frame small-photo"><img src="gato 1.jpg"></div>
            <div class="photo-frame small-photo"><img src="gato 2.jpg"></div>
            <div class="photo-frame small-photo"><img src="gato 3.jpg"></div>
        </div>
        <h2 class="description-highlight">ESTE PEQUEÑO DETALLE ES PARA TI, EVE :)</h2>
        <button class="btn-primary" onclick="empezarRegalo()">PRESIONA AQUÍ</button>
    </div>

    <video id="video-fondo" muted loop playsinline><source src="fondovideo.mp4" type="video/mp4"></video>
    <div id="lyrics-container"></div>
    <div id="mensaje-despedida"><h1>Gracias por ser parte de mi mundo. ❤️</h1></div>
    <audio id="miMusica" src="tracker.mp3"></audio>

    <script>
        const audio = document.getElementById("miMusica");
        const video = document.getElementById("video-fondo");
        const container = document.getElementById("lyrics-container");
        const portada = document.getElementById("contenedor-portada");

        const lyricsData = [
            { text: "She told me that she loved me by the water fountain", time: 13.8 },
            { text: "She told me that she loved me and she didn't love him", time: 17.2 },
            { text: "And that was really lovely 'cause it was innocent", time: 20.8 },
            { text: "But now she's got a cup with something else in it", time: 24.2 },
            { text: "It's getting kind of blurry at a quarter past ten", time: 27.8 },
            { text: "And he was in a hurry to be touching her skin", time: 31.5 },
            { text: "She's feeling kind of dirty when she's dancing with him", time: 34.8 },
            { text: "Forgetting what she told me by the water fountain", time: 38.2 },
            { text: "Now he's grabbing her hips, and pulling her in", time: 42.1 },
            { text: "Kissing her lips, and whispering in her ear", time: 45.8 },
            { text: "And she knows that she shouldn't listen", time: 49.5 },
            { text: "And that she should be with me by the water fountain", time: 53.0 },
            { text: "She couldn't be at home in the night time because", time: 56.8 },
            { text: "It made her feel alone, but at that time she was too young", time: 60.5 },
            { text: "I was too young", time: 67.5 },
            { text: "I should've built a home with a fountain for us", time: 71.2 },
            { text: "The moment that she told me that she was in love too young", time: 74.8 },
            { text: "I was too young", time: 80.8 },
            { text: "Too young, too young, too young, young", time: 83.5 },
            { text: "And if she ever goes back to the water fountain", time: 96.5 },
            { text: "The handle will be broken and the rust set in", time: 100.5 },
            { text: "But my hand, it will be open and I'll try to fix it", time: 104.8 },
            { text: "My heart, it will be open and I'll try to give it", time: 109.0 },
            { text: "Now I'm grabbing her hips, and pulling her in", time: 112.8 },
            { text: "Kissing her lips, and whispering in her ear", time: 116.8 },
            { text: "And I know that it's only a wish", time: 120.5 },
            { text: "And that we're not standing by the water fountain", time: 124.5 },
            { text: "Too young, too young, too young, young", time: 129.0 },
            { text: "She couldn't be at home in the night time because", time: 135.5 },
            { text: "It made her feel alone, but at that time she was too young", time: 139.5 },
            { text: "I was too young", time: 146.5 },
            { text: "I should've built a home with a fountain for us", time: 150.5 },
            { text: "The moment that she told me that she was in love too young", time: 154.0 },
            { text: "I was too young", time: 157.5 },
            { text: "Too young, too young, too young, young", time: 161.0 },
            { text: "(Too young) I should've built a home with a fountain for us", time: 181.0 },
            { text: "(Too young) The moment that she told me that she was in love", time: 185.0 },
            { text: "(Too young) Too young", time: 189.0 },
            { text: "(Young) I was too young ❤️", time: 192.0 }
        ];

        function createPetal() {
            const petal = document.createElement("div");
            petal.classList.add("petal");
            petal.style.left = Math.random() * 100 + "vw";
            petal.style.animationDuration = (Math.random() * 2 + 4) + "s";
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }

        function updateLyrics() {
            const time = audio.currentTime;
            const index = lyricsData.findIndex((line, i) => {
                const nextLine = lyricsData[i + 1];
                return time >= line.time && (!nextLine || time < nextLine.time);
            });

            if (index !== -1) {
                const currentLine = lyricsData[index];
                const nextLine = lyricsData[index + 1];
                // Calculamos duración para el efecto karaoke
                const duration = nextLine ? (nextLine.time - currentLine.time) : 3.5;

                if (container.getAttribute("data-index") !== index.toString()) {
                    container.innerHTML = `<p class="lyrics-line" style="animation-duration: ${duration}s">${currentLine.text}</p>`;
                    container.setAttribute("data-index", index);
                }
            }
        }

        function empezarRegalo() {
            portada.style.opacity = "0";
            setTimeout(() => {
                portada.style.display = "none";
                video.style.display = "block";
                container.style.display = "block";
                document.body.style.backgroundColor = "#000";
                audio.play();
                video.play();
                setInterval(createPetal, 200);
            }, 1000);
        }

        audio.addEventListener("timeupdate", updateLyrics);
        audio.addEventListener("ended", () => {
            document.getElementById("mensaje-despedida").style.display = "block";
            setTimeout(() => { document.getElementById("mensaje-despedida").style.opacity = "1"; }, 100);
            container.style.display = "none";
        });
    </script>
</body>
</html>
