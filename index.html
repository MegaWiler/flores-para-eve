<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Eve ❤️</title>
    <style>
        /* ESTILOS CSS INTEGRADOS (El diseño visual) */
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf2f5; /* Fondo rosa pastel pálido */
            font-family: 'Comic Sans MS', 'Arial', sans-serif; /* Fuente suave */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        /* Título "Hola!" */
        h1 {
            color: #ff4081; /* Rosa vibrante */
            font-size: 2.5rem;
            margin-bottom: 25px;
        }

        /* Estilo para todas las fotos */
        .photo-frame {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* Sombra suave */
            overflow: hidden;
            display: inline-block;
            margin: 10px;
            border: 5px solid white; /* Borde blanco grueso */
        }

        /* Foto principal del Mapache */
        .main-photo {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }

        /* Contenedor de las 3 fotos de abajo */
        .small-photos-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Fotos pequeñas de los gatos */
        .small-photo {
            width: 100px;
            height: 100px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que la imagen llene el marco sin deformarse */
        }

        /* Frase para Eve */
        .description {
            color: #ff4081;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Botón Amarillo "Presiona aquí" */
        .btn-primary {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ffc107; /* Amarillo brillante */
            color: #333; /* Texto oscuro para contraste */
            text-decoration: none; /* Quitar subrayado */
            border-radius: 50px; /* Bordes redondeados */
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Efecto al pasar el mouse por el botón */
        .btn-primary:hover {
            transform: scale(1.05); /* Agranda un poquito */
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.6);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Hola!</h1>

        <div class="photo-frame main-photo">
            
<img src="mapache flor.jpg" alt="Mapache con flor">
        </div>

        <div class="small-photos-container">
            <div class="photo-frame small-photo">
                <img src="gato 1.jpg" alt="Gato 1">
            </div>
            <div class="photo-frame small-photo">
                <img src="gato 2.jpg" alt="Gato 2">
            </div>
            <div class="photo-frame small-photo">
                <img src="gato 3.jpg" alt="Gato 3">
            </div>
        </div>

        <p class="description">ESTE PEQUEÑO DETALLE ES PARA TI, EVE :)</p>

        
<a href="flower.html" class="btn-primary">PRESIONA AQUÍ</a>
    </div>
</body>
</html>
