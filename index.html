<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Para Eve ❤️</title>
</head>
<body>
    <div class="main-container">
        <!-- Saludo Inicial -->
        <div class="greetings">
            <span class="letter">H</span><span class="letter">o</span><span class="letter">l</span><span class="letter">a</span><span class="letter">!</span>
        </div>

        <!-- Foto Principal: Mapache -->
        <div class="image-wrapper main-photo">
            <img src="img/mapache flor.jpg" alt="Mapache con flor" class="img-content">
        </div>

        <!-- Fotos Secundarias: Los 3 Gatos -->
        <div class="gatos-collage">
            <div class="photo-card"><img src="img/gato 1.jpg" alt="Gato 1" class="img-content"></div>
            <div class="photo-card"><img src="img/gato 2.jpg" alt="Gato 2" class="img-content"></div>
            <div class="photo-card"><img src="img/gato 3.jpg" alt="Gato 3" class="img-content"></div>
        </div>

        <!-- Texto con Presencia y Botón -->
        <div class="content-footer">
            <h2 class="description-highlight">ESTE PEQUEÑO DETALLE ES PARA TI, EVE :)</h2>
            <a href="flower.html" class="btn-primary">PRESIONA AQUÍ</a>
        </div>
    </div>
</body>
</html>
